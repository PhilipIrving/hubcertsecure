
name: HUB CertSecure — Monthly Snapshot

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: 'Snapshot month to write (YYYY-MM). Leave blank for current month.'
        required: false
        default: ''

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve snapshot year and month
        id: month
        run: |
          if [ -n "${{ github.event.inputs.snapshot_date }}" ]; then
            MONTH="${{ github.event.inputs.snapshot_date }}"
          else
            MONTH=$(date -u +'%Y-%m')
          fi
          YEAR="${MONTH:0:4}"
          echo "Snapshot year:  $YEAR"
          echo "Snapshot month: $MONTH"
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          echo "year=$YEAR"   >> $GITHUB_OUTPUT

      - name: Create snapshot directory
        run: mkdir -p "snapshots/${{ steps.month.outputs.year }}/${{ steps.month.outputs.month }}"

      - name: Copy Evident CSVs to snapshot folder
        run: |
          DEST="snapshots/${{ steps.month.outputs.year }}/${{ steps.month.outputs.month }}"
          COPIED=0
          for f in data/evident/*.csv; do
            if [ -f "$f" ]; then
              cp "$f" "$DEST/"
              echo "  copied: $f"
              COPIED=$((COPIED + 1))
            fi
          done
          if [ "$COPIED" -eq 0 ]; then
            echo "WARNING: No CSV files found in data/evident/"
          else
            echo "Copied $COPIED file(s) to $DEST/"
          fi

      - name: Check for changes
        id: changes
        run: |
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push snapshot
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "snapshot: ${{ steps.month.outputs.month }} monthly data snapshot"
          git pull --rebase
          git push
